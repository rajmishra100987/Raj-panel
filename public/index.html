<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Bot Hosting Panel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Bot Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item active">
                    <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="/filemanager" class="nav-item">
                    <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                    <span>File Manager</span>
                </a>
                <a href="#" class="nav-item" onclick="logout()">
                    <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1>Dashboard</h1>
                <div class="upload-area">
                    <button class="btn btn-primary" onclick="showUploadModal()">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        New Bot
                    </button>
                </div>
            </header>

            <div class="dashboard-content">
                <div id="botsContainer" class="bots-grid">
                    <div class="loading">Loading bots...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Upload New Bot</h2>
                <button class="close-btn" onclick="closeUploadModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="botName">Bot Name</label>
                        <input type="text" id="botName" name="name" placeholder="my-awesome-bot" required>
                    </div>
                    <div class="form-group">
                        <label for="botFile">Bot ZIP File</label>
                        <div class="file-upload-area" id="dropZone">
                            <input type="file" id="botFile" name="bot" accept=".zip" required>
                            <p>Drag & drop ZIP file here or click to browse</p>
                        </div>
                    </div>
                    <div class="upload-progress" id="uploadProgress" style="display:none;">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <p class="progress-text">Uploading...</p>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Upload Bot</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Console Modal -->
    <div id="consoleModal" class="modal">
        <div class="modal-content console-modal">
            <div class="modal-header">
                <h2 id="consoleTitle">Console</h2>
                <div class="console-actions">
                    <button class="btn btn-small" onclick="clearConsole()">Clear</button>
                    <button class="close-btn" onclick="closeConsoleModal()">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <pre id="consoleOutput" class="console-output"></pre>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
